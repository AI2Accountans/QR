<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cacumen | Contacto</title>
    <style>
        :root {
            --primary: #0056b3;
            --bg-color: #f8f9fa;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(0, 0, 0, 0.05);
            --text-color: #2b2b2b;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
        }
        body {
            padding: 40px 0;
            text-align: center;
            overflow-x: hidden;
            overflow-y: auto;
        }
        /* Canvas Network Background */
        #network-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        /* Glassmorphism Card */
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 24px;
            padding: 40px 30px;
            display: inline-block;
            text-align: center;
            max-width: 380px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .logo-simbolo {
            width: 240px;
            height: auto;
            margin: 0 auto -90px;
            display: block;
            filter: drop-shadow(0 12px 24px rgba(0, 86, 179, 0.15));
        }
        .logo-nombre {
            width: 180px;
            height: auto;
            margin: 0 auto 30px;
            display: block;
        }
        .contact-form {
            text-align: center;
            margin-top: 30px;
        }
        .btn-submit {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 16px 30px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.5px;
            text-decoration: none;
            width: 100%;
            box-sizing: border-box;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 86, 179, 0.2);
            background: #004494;
        }
        .direct-contact {
            margin-top: 35px;
            padding-top: 25px;
            border-top: 1px solid #eee;
        }
        .direct-contact h3 {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
        }
        .consultants {
            display: flex;
            justify-content: space-around;
            gap: 15px;
        }
        .consultant-item {
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s;
            flex: 1;
        }
        .consultant-item:hover {
            transform: translateY(-5px);
        }
        .avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 10px;
        }
        .consultant-name {
            font-size: 13px;
            font-weight: 600;
            color: #444;
        }
        .wa-tag {
            font-size: 10px;
            color: #25D366;
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <canvas id="network-canvas"></canvas>
    <div class="card">
        <img src="Cacumen Logo_Transparente simbolo.png" alt="Cacumen Logo" class="logo-simbolo">
        <img src="Cacumen Logo_Transparente Nombre.png" alt="Cacumen" class="logo-nombre">
        <p style="margin-bottom: 20px;">Arquitectura empresarial para la era de la IA</p>
        
        <div class="contact-form">
            <button data-tally-open="kdKQXe" data-tally-layout="modal" data-tally-width="500" class="btn-submit">Solicitar Consultoría Privada</button>
        </div>

        <div class="direct-contact">
            <h3>Atención Inmediata</h3>
            <div class="consultants">
                <a href="https://wa.me/573012716731?text=Hola%20Richard,%20me%20interesa%20la%20arquitectura%20empresarial%20para%20la%20era%20de%20la%20IA" class="consultant-item" target="_blank">
                    <img src="3012716731.jpg" alt="Richard" class="avatar">
                    <span class="consultant-name">Richard</span>
                    <span class="wa-tag">WhatsApp</span>
                </a>
                <a href="https://wa.me/573192082530?text=Hola,%20me%20interesa%20la%20arquitectura%20empresarial%20para%20la%20era%20de%20la%20IA" class="consultant-item" target="_blank">
                    <img src="3192082530.jpg" alt="Miguel" class="avatar">
                    <span class="consultant-name">Miguel</span>
                    <span class="wa-tag">WhatsApp</span>
                </a>
            </div>
        </div>
    </div>
    <script async src="https://tally.so/widgets/embed.js"></script>
    <script>
        const canvas = document.getElementById('network-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, nodes;
        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            nodes = [];
            const numNodes = Math.floor((width * height) / 12000);
            for (let i = 0; i < numNodes; i++) {
                nodes.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    radius: Math.random() * 2 + 1
                });
            }
        }
        function draw() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = 'rgba(0, 86, 179, 0.3)';
            ctx.strokeStyle = 'rgba(0, 86, 179, 0.15)';
            ctx.lineWidth = 1;
            for (let i = 0; i < nodes.length; i++) {
                let node = nodes[i];
                node.x += node.vx;
                node.y += node.vy;
                if (node.x < 0 || node.x > width) node.vx *= -1;
                if (node.y < 0 || node.y > height) node.vy *= -1;
                ctx.beginPath();
                ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
                ctx.fill();
                for (let j = i + 1; j < nodes.length; j++) {
                    let node2 = nodes[j];
                    let dist = Math.sqrt(Math.pow(node.x - node2.x, 2) + Math.pow(node.y - node2.y, 2));
                    if (dist < 150) {
                        ctx.beginPath();
                        ctx.moveTo(node.x, node.y);
                        ctx.lineTo(node2.x, node2.y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', init);
        init();
        draw();
    </script>
</body>
</html>
