<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cacumen | Contacto</title>
    <style>
        :root {
            --primary: #0056b3;
            --bg-color: #f8f9fa;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(0, 0, 0, 0.05);
            --text-color: #2b2b2b;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* Canvas Network Background */
        #network-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        /* Glassmorphism Card */
        .card {
            position: relative;
            z-index: 2;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            max-width: 380px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .logo-simbolo {
            width: 240px;
            height: auto;
            margin: 0 auto -90px;
            display: block;
            filter: drop-shadow(0 12px 24px rgba(0, 86, 179, 0.15));
        }
        .logo-nombre {
            width: 180px;
            height: auto;
            margin: 0 auto 30px;
            display: block;
        }
        .contact-form {
            text-align: left;
            margin-top: 20px;
        }
        .form-group {
            margin-bottom: 12px;
        }
        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 4px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            background: rgba(255, 255, 255, 0.6);
            font-family: inherit;
            font-size: 14px;
            box-sizing: border-box;
            transition: all 0.2s;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(0, 86, 179, 0.05);
        }
        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 86, 179, 0.2);
            background: #004494;
        }
    </style>
</head>
<body>
    <canvas id="network-canvas"></canvas>
    <div class="card">
        <img src="Cacumen Logo_Transparente simbolo.png" alt="Cacumen Logo" class="logo-simbolo">
        <img src="Cacumen Logo_Transparente Nombre.png" alt="Cacumen" class="logo-nombre">
        <p style="margin-bottom: 20px;">Arquitectura empresarial para la era de la IA</p>
        
        <form action="https://formspree.io/f/xdabbvry" method="POST" class="contact-form">
            <div class="form-group">
                <label for="name">Nombre Completo</label>
                <input type="text" id="name" name="name" placeholder="Ej. Juan Pérez" required>
            </div>
            <div class="form-group">
                <label for="company">Empresa / Organización</label>
                <input type="text" id="company" name="company" placeholder="Nombre de tu empresa">
            </div>
            <div class="form-group">
                <label for="contact">Email o WhatsApp</label>
                <input type="text" id="contact" name="contact" placeholder="Donde podemos contactarte" required>
            </div>
            <div class="form-group">
                <label for="message">¿En qué podemos apoyarte?</label>
                <textarea id="message" name="message" rows="3" placeholder="Cuéntanos brevemente tu interés"></textarea>
            </div>
            <button type="submit" class="btn-submit">Solicitar Consultoría Privada</button>
        </form>
    </div>
    <script>
        const canvas = document.getElementById('network-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, nodes;
        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            nodes = [];
            const numNodes = Math.floor((width * height) / 12000);
            for (let i = 0; i < numNodes; i++) {
                nodes.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    radius: Math.random() * 2 + 1
                });
            }
        }
        function draw() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = 'rgba(0, 86, 179, 0.3)';
            ctx.strokeStyle = 'rgba(0, 86, 179, 0.15)';
            ctx.lineWidth = 1;
            for (let i = 0; i < nodes.length; i++) {
                let node = nodes[i];
                node.x += node.vx;
                node.y += node.vy;
                if (node.x < 0 || node.x > width) node.vx *= -1;
                if (node.y < 0 || node.y > height) node.vy *= -1;
                ctx.beginPath();
                ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
                ctx.fill();
                for (let j = i + 1; j < nodes.length; j++) {
                    let node2 = nodes[j];
                    let dist = Math.sqrt(Math.pow(node.x - node2.x, 2) + Math.pow(node.y - node2.y, 2));
                    if (dist < 150) {
                        ctx.beginPath();
                        ctx.moveTo(node.x, node.y);
                        ctx.lineTo(node2.x, node2.y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', init);
        init();
        draw();
    </script>
</body>
</html>
